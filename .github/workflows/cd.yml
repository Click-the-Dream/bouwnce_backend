name: CD

on:
    push:
        branches: [staging]
    pull_request:
        branches: [staging]

concurrency:
    group: cd-${{ github.base_ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: Run CI
        uses: ./.github/workflows/ci.yml
        permissions:
            contents: read
            security-events: write

    # Deploy Staging
    deploy-staging:
        name: Deploy to Staging
        needs: ci
        runs-on: ubuntu-latest
        environment: staging
        # if: github.event.pull_request.merged == true && github.ref == 'staging'
        steps:
            - name: Deploy to Staging
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST}}
                username: ${{ secrets.EC2_USER}}
                key: ${{ secrets.EC2_SSH_KEY}}
                script: |
                    set -euo pipefail

                    cd /var/www/backend
                    export PATH="$HOME/.local/bin:$PATH"

                    git fetch origin staging
                    git checkout staging
                    git pull origin staging

                    uv sync

                    set -a
                    source /var/www/backend/.venv/bin/activate
                    set +a

                    uv run alembic upgrade head

                    pm2 start ecosystem.config.js --only staging, celery-worker-staging, flower-staging || \
                    pm2 reload ecosystem.config.js --only staging, celery-worker-staging, flower-staging

                    pm2 save

                    echo  "⏳ Waiting for API to be ready..."
                    for i in $(seq 1 15); do
                        curl -sf http://localhost:8000/api/health && echo "✅ API is healthy!" && exit 0
                        sleep 2
                    done
                    echo "❌ API failed to start within expected time."
                    exit 1