name: CI

permissions:
  contents: read

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]
  workflow_call:

concurrency:
  group: backend-${{ github.base_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  trunk-fmt:
    name: Trunk Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trunk launcher
        run: |
          curl -fsSL https://trunk.io/releases/trunk -o trunk
          chmod +x trunk

      - name: Run Trunk format check
        run: ./trunk fmt --ci --no-progress --all

  trunk:
    name: Trunk Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trunk launcher
        run: |
          curl -fsSL https://trunk.io/releases/trunk -o trunk
          chmod +x trunk

      - name: Run Trunk check
        run: ./trunk check --ci --no-progress --all --exclude bandit,checkov,osv-scanner,trufflehog

  trunk-security:
    name: Trunk Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trunk launcher
        run: |
          curl -fsSL https://trunk.io/releases/trunk -o trunk
          chmod +x trunk

      - name: Run Trunk security checks
        run: ./trunk check --ci --no-progress --all --scope security

  # TESTS
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [trunk-fmt, trunk, trunk-security]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run migrations
        env:
          SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://postgres@localhost:5433/test_db
          SQLALCHEMY_DATABASE_DEV_URL: postgresql+asyncpg://postgres@localhost:5433/test_db
          FASTAPI_ENV: development
          JWT_SECRET_KEY: ci-test-secret
          MONGODB_DATABASE_URL: mongodb://localhost:27017/test_db
          MONGODB_DB_NAME: test_db
          BASE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379/0
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest --tb=short -q
