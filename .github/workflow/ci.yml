name: Backend CI

on:
  pull_request:
  push:
    branches: [staging]


jobs:
  lint: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      # ruff check
      - name: Run ruff
        run: uv run ruff check .
      
      # Black check (not formatting)
      - name: Run black
        run: uv run black --check .
        
