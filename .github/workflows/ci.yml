name: CI/CD

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

concurrency:
  group: backend-${{ github.base_ref || github.ref_name }}
  cancel-in-progress: true


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check --output-format=github .

      - name: Format with ruff
        run: uv run ruff format --check .


  # SECURITY
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v4

       - name: Run Trivy vulnerability  scanner
         uses: aquasecurity/trivy-action@v0.36.0
         with:
            scan-type: fs
            scan-ref: .
            severity: HIGH,CRITICAL
            exit-code: 1
            format: table

       - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
         with:
            enable-cache: true
            github-token: ${{ secrets.GITHUB_TOKEN }}

       - name: Install dependencies
         run: uv sync --dev

       - name: Check for vulnerable dependencies
         run: uv run pip-audit --ignore-vuln PYSEC-2025-183

       - name: Run Bandit security scan
         run: uv run bandit -r app -ll -ii

       - name: scan for hardcoded secrets
         uses: trufflesecurity/trufflehog@main
         with:
          path: ./
          extra_args: --only-verified

  # TESTS
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install dependencies
        run: uv sync --dev

      - name: Run migrations
        env:
          SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5433/test_db
          SQLALCHEMY_DATABASE_DEV_URL: postgresql+asyncpg://postgres:password@localhost:5433/test_db
          FASTAPI_ENV: development
          JWT_SECRET_KEY: ci-test-jwt-secret-not-for-production
          MONGODB_DATABASE_URL: mongodb://localhost:27017/test_db
          MONGODB_DB_NAME: test_db
          BASE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379/0
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest --tb=short -q

  deploy-staging:
    name: Deploy to Staging
    needs: tests
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST}}
          username: ${{ secrets.EC2_USER}}
          key: ${{ secrets.EC2_SSH_KEY}}
          script: |
              set -euo pipefail

              cd /var/www/backend

              git fetch origin staging
              git checkout staging
              git pull origin staging

              if [ ! -x .venv/bin/python ]; then
                  python3 -m venv .venv
              fi

              .venv/bin/pip install --upgrade pip
              .venv/bin/pip install -r requirements.txt

              set -a
              source /var/www/backend/.env
              set +a

              .venv/bin/alembic current
              .venv/bin/alembic upgrade head

              if command -v pm2 >/dev/null 2>&1; then
                  pm2 start ecosystem.config.js --only staging,celery-worker-staging,flower-staging --update-env || \
                  pm2 reload ecosystem.config.js --only staging,celery-worker-staging,flower-staging --update-env
                  pm2 save
              elif command -v npx >/dev/null 2>&1; then
                  npx --yes pm2 start ecosystem.config.js --only staging,celery-worker-staging,flower-staging --update-env || \
                  npx --yes pm2 reload ecosystem.config.js --only staging,celery-worker-staging,flower-staging --update-env
                  npx --yes pm2 save
              else
                  echo "❌ pm2 and npx are not available on the server."
                  exit 1
              fi

              echo  "⏳ Waiting for API to be ready..."
              for i in $(seq 1 20); do
                  curl -sf http://localhost:8000/api/health && echo "✅ API is healthy!" && exit 0
                  sleep 2
              done
              if command -v pm2 >/dev/null 2>&1; then
                  pm2 status || true
                  pm2 logs staging --lines 50 || true
              fi
              echo "❌ API failed to start within expected time."
              exit 1
